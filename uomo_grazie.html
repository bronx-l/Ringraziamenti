<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Uomo Grazie</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #fffbe8;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Bebas Neue', sans-serif;
    }
    .confetti { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
    .dot {
      position: absolute;
      width: clamp(8px,1.5vw,14px); height: clamp(8px,1.5vw,14px);
      border-radius: 50%;
      opacity: 0;
      animation: confettiFall linear infinite;
    }
    @keyframes confettiFall {
      0%  { transform: translateY(-20px) rotate(0deg); opacity:0; }
      5%  { opacity:1; }
      90% { opacity:.7; }
      100%{ transform: translateY(110vh) rotate(720deg); opacity:0; }
    }
    .card {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; text-align: center; padding: 0 20px;
    }
    .uomo {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(80px, 22vw, 180px);
      color: #1a1a1a; letter-spacing: 0.05em; line-height: 1;
      opacity: 0; transform: scale(.6) rotate(-4deg);
      animation: popBig .7s cubic-bezier(.2,.9,.2,1.2) .3s forwards;
    }
    .grazie {
      font-family: 'Pacifico', cursive;
      font-size: clamp(54px, 15vw, 120px);
      color: transparent;
      background: linear-gradient(90deg, #e8a000, #c2185b, #e8a000);
      background-size: 200% 100%;
      -webkit-background-clip: text; background-clip: text;
      line-height: 1;
      animation: popBig .7s cubic-bezier(.2,.9,.2,1.2) .8s both, shimmer 3s linear 1.5s infinite;
      opacity: 0;
    }
    @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
    .emoji-row {
      display:flex; gap:8px; margin-top:6px;
      font-size: clamp(24px,6vw,42px);
      opacity:0; animation: popBig .5s ease 1.3s both;
    }
    @keyframes popBig {
      from{ opacity:0; transform:scale(.6) rotate(-3deg); }
      to  { opacity:1; transform:scale(1) rotate(0deg); }
    }
    .divider {
      width: clamp(120px,40vw,260px); height:2px;
      background: linear-gradient(90deg, transparent, #c2185b, #e8a000, transparent);
      margin: 14px 0 10px;
      opacity:0; animation: fadeIn .5s ease 1.6s both;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .sponsor {
      opacity:0; animation: fadeIn .5s ease 1.9s both;
      display:flex; flex-direction:column; align-items:center; gap:6px;
    }
    .sponsor-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(11px,2.5vw,16px);
      letter-spacing: 0.25em; color:#888; text-transform:uppercase;
    }
    .logo-img {
      width: clamp(90px,22vw,160px); border-radius:8px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.15));
    }

    /* PULSANTE MUSICA */
    .music-btn {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      z-index: 10;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 50px;
      padding: 13px 28px;
      font-size: clamp(13px,3vw,16px);
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .1em;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
      animation: fadeIn 1s ease 2.2s both;
      transition: background .2s, transform .1s;
    }
    .music-btn:hover { background: #c2185b; transform: translateX(-50%) scale(1.04); }
    .music-btn .note { font-size:1.4em; }

    /* player YT nascosto ma presente nel DOM */
    #yt-player { position:fixed; bottom:-200px; left:-200px; width:1px; height:1px; opacity:0; pointer-events:none; }
  </style>
</head>

      d.style.background = colors[Math.floor(Math.random()*colors.length)];
      d.style.animationDuration = (4+Math.random()*6)+'s';
      d.style.animationDelay = (-Math.random()*8)+'s';
      d.style.borderRadius = Math.random()>.4?'50%':'2px';
      cont.appendChild(d);
    }

    // === YOUTUBE PLAYER API ===
    let player;
    let playerReady = false;
    let pendingPlay = false;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        height: '1',
        width: '1',
        videoId: 'Nj08eEe22ec',
        playerVars: {
          autoplay: 0,
          loop: 1,
          playlist: 'Nj08eEe22ec',
          controls: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          modestbranding: 1,
        },
        events: {
          onReady: function(e) {
            playerReady = true;
            if(pendingPlay) { e.target.playVideo(); }
          }
        }
      });
    }

    let playing = false;
    function toggleMusic() {
      if(!playing) {
        playing = true;
        document.getElementById('musicLabel').textContent = 'PAUSA MUSICA';
        document.getElementById('musicNote').textContent = '🔊';
        if(playerReady) {
          player.unMute();
          player.setVolume(80);
          player.playVideo();
        } else {
          pendingPlay = true;
        }
      } else {
        playing = false;
        document.getElementById('musicLabel').textContent = 'ATTIVA MUSICA';
        document.getElementById('musicNote').textContent = '🎵';
        if(playerReady) player.pauseVideo();
      }
    }
  </script>
</body>
</html>
