<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grazie</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:  #4caf50;
      --accent2: #2e7d32;
      --bg:      #060a06;
      --soft:    rgba(76,175,80,0.08);
      --muted:   rgba(76,175,80,0.55);
    }

    html, body {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      overflow: hidden;
    }

    /* Griglia stile palestra */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(76,175,80,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(76,175,80,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .bg-glow {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      filter: blur(80px);
      animation: breathe 4s ease-in-out infinite;
    }
    .g1 { width:400px;height:400px;top:-120px;left:-120px;background:rgba(76,175,80,0.14); }
    .g2 { width:320px;height:320px;bottom:-80px;right:-80px;background:rgba(46,125,50,0.10);animation-delay:-2s; }

    @keyframes breathe {
      0%,100% { transform: scale(1);    opacity:.8; }
      50%      { transform: scale(1.12);opacity:1;  }
    }

    .wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
    }

    /* Manubrio sopra */
    .dumbbell {
      font-size: clamp(36px, 10vw, 60px);
      animation: lift 2.4s cubic-bezier(.4,0,.2,1) 0.2s infinite;
      filter: drop-shadow(0 6px 20px rgba(76,175,80,0.5));
    }

    @keyframes lift {
      0%,100% { transform: translateY(0)  scale(1);    opacity:0; }
      8%      { opacity: 1; }
      20%     { transform: translateY(-12px) scale(1.1); }
      40%     { transform: translateY(0)  scale(1); }
      55%     { transform: translateY(-8px) scale(1.05); }
      70%     { transform: translateY(0)  scale(1); opacity:1; }
      88%     { opacity: 0; }
    }

    /* Scritta principale */
    .grazie {
      font-family: 'Barlow Condensed', 'Arial Narrow', Impact, sans-serif;
      font-size: clamp(80px, 22vw, 148px);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
      color: transparent;
      background: linear-gradient(90deg, var(--accent) 50%, transparent 50%);
      background-size: 200% 100%;
      background-position: 100% 0;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-stroke: 2.5px var(--accent);
      animation: fill 2.4s cubic-bezier(.4,0,.2,1) 0.2s infinite;
      filter: drop-shadow(0 0 28px rgba(76,175,80,0.35));
    }

    @keyframes fill {
      0%   { background-position: 100% 0; opacity: 0.15; }
      8%   { opacity: 1; }
      50%  { background-position: 0% 0; }
      70%  { background-position: 0% 0; opacity: 1; }
      86%  { opacity: 0; }
      100% { background-position: 100% 0; opacity: 0; }
    }

    /* Barra di progresso stile rep counter */
    .bar-wrap {
      width: clamp(180px, 50vw, 280px);
      height: 4px;
      background: rgba(76,175,80,0.15);
      border-radius: 99px;
      overflow: hidden;
      animation: barFade 2.4s ease 0.2s infinite;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 99px;
      animation: barGrow 2.4s cubic-bezier(.4,0,.2,1) 0.2s infinite;
      box-shadow: 0 0 12px rgba(76,175,80,0.6);
    }

    @keyframes barGrow {
      0%   { width: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      55%  { width: 100%; }
      75%  { width: 100%; opacity: 1; }
      90%  { opacity: 0; }
      100% { width: 0%;   opacity: 0; }
    }

    @keyframes barFade {
      0%,8%  { opacity: 0; }
      15%    { opacity: 1; }
      75%    { opacity: 1; }
      90%    { opacity: 0; }
      100%   { opacity: 0; }
    }

    .caption {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      font-size: clamp(12px, 3vw, 15px);
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.01em;
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
      animation: barFade 2.4s ease 0.2s infinite;
    }
  </style>
</head>
<body>
  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>

  <div class="wrap">
    <div class="dumbbell">🏋️</div>
    <span class="grazie">Grazie</span>
    <div class="bar-wrap">
      <div class="bar-fill"></div>
    </div>
    <p class="caption">una foto del tramonto non la tengo 😄</p>
  </div>
</body>
</html>
