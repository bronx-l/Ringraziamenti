<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grazie</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pen:    #2e7d32;
      --pen2:   #1b5e20;
      --soft:   rgba(46,125,50,0.12);
      --muted:  rgba(46,125,50,0.55);
      --bg:     #f5f8f5;
      --heart:  #e57373;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --pen:   #a5d6a7;
        --pen2:  #c8e6c9;
        --soft:  rgba(165,214,167,0.10);
        --muted: rgba(165,214,167,0.50);
        --bg:    #060a06;
        --heart: #ef9a9a;
      }
    }

    html, body {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      overflow: hidden;
    }

    /* Sfondo: cerchi morbidi */
    .bg-circle {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      background: var(--soft);
      animation: pulse 6s ease-in-out infinite;
    }
    .c1 { width:340px;height:340px;top:-80px;left:-80px;animation-delay:0s; }
    .c2 { width:260px;height:260px;bottom:-60px;right:-60px;animation-delay:-3s; }

    @keyframes pulse {
      0%,100% { transform: scale(1);   opacity: .7; }
      50%      { transform: scale(1.08);opacity: 1; }
    }

    /* Wrapper centrale */
    .wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
      animation: fadeIn .8s ease both;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Scritta principale */
    .grazie {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(72px, 20vw, 130px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: transparent;
      background: linear-gradient(90deg, var(--pen) 50%, transparent 50%);
      background-size: 200% 100%;
      background-position: 100% 0;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-stroke: 1.8px var(--pen);
      animation: fill 2.2s cubic-bezier(.4,0,.2,1) 0.3s infinite;
      filter: drop-shadow(0 4px 18px var(--soft));
    }

    @keyframes fill {
      0%   { background-position: 100% 0; opacity: 0.18; }
      8%   { opacity: 1; }
      52%  { background-position: 0% 0; }
      72%  { background-position: 0% 0; opacity: 1; }
      88%  { opacity: 0; }
      100% { background-position: 100% 0; opacity: 0; }
    }

    /* Cuore SVG animato */
    .heart-wrap {
      display: flex; align-items: center; justify-content: center;
      animation: heartbeat 2.2s cubic-bezier(.4,0,.2,1) 0.3s infinite;
    }

    @keyframes heartbeat {
      0%,100% { transform: scale(0.4);  opacity: 0; }
      10%     { transform: scale(1.15); opacity: 1; }
      20%     { transform: scale(0.95); }
      30%     { transform: scale(1.08); }
      55%     { transform: scale(1);    opacity: 1; }
      80%     { transform: scale(1);    opacity: 1; }
      95%     { transform: scale(0.6);  opacity: 0; }
    }

    .heart-svg {
      width: clamp(36px, 9vw, 58px);
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(229,115,115,0.45));
    }

    @keyframes fill2 {
      0%,8%  { opacity: 0; transform: translateY(6px); }
      20%    { opacity: 1; transform: translateY(0); }
      72%    { opacity: 1; }
      90%    { opacity: 0; }
      100%   { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>

  <div class="wrap">
    <span class="grazie">Grazie</span>

    <div class="heart-wrap">
      <svg class="heart-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <path fill="var(--heart)"
          d="M50 85 C50 85, 5 52, 5 28
             C5 12, 17 2, 30 2
             C40 2, 48 9, 50 14
             C52 9, 60 2, 70 2
             C83 2, 95 12, 95 28
             C95 52, 50 85, 50 85 Z"/>
      </svg>
    </div>
  </div>
</body>
</html>
