<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grazie</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:   #d4607a;
      --rose2:  #e8a0b0;
      --blush:  #f9eef1;
      --blush2: #f0d8e0;
      --text:   #4a1a2a;
      --muted:  rgba(74,26,42,0.55);
      --gold:   #c9956a;
    }

    html, body {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, var(--blush) 0%, var(--blush2) 100%);
      overflow: hidden;
    }

    /* Petali che cadono */
    .petal {
      position: fixed; z-index: 0;
      font-size: clamp(14px, 3vw, 22px);
      pointer-events: none;
      animation: petalFall linear infinite;
      opacity: 0;
    }
    .p1  { left:  8%; animation-duration: 6s;   animation-delay: 0s;    }
    .p2  { left: 20%; animation-duration: 7.5s; animation-delay: -2s;   }
    .p3  { left: 35%; animation-duration: 5.5s; animation-delay: -4s;   }
    .p4  { left: 50%; animation-duration: 8s;   animation-delay: -1s;   }
    .p5  { left: 65%; animation-duration: 6.5s; animation-delay: -3.5s; }
    .p6  { left: 78%; animation-duration: 7s;   animation-delay: -5s;   }
    .p7  { left: 90%; animation-duration: 5s;   animation-delay: -1.5s; }

    @keyframes petalFall {
      0%   { transform: translateY(-40px) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Fiori angoli */
    .flower {
      position: fixed; font-size: clamp(28px, 8vw, 48px);
      pointer-events: none; z-index: 0; opacity: 0.55;
      animation: flowerSway 4s ease-in-out infinite;
    }
    .fl-tl { top: 12px;  left: 12px;  animation-delay: 0s; }
    .fl-tr { top: 12px;  right: 12px; animation-delay: -1s; transform: scaleX(-1); }
    .fl-bl { bottom: 12px; left: 12px;  animation-delay: -2s; }
    .fl-br { bottom: 12px; right: 12px; animation-delay: -3s; transform: scaleX(-1); }

    @keyframes flowerSway {
      0%,100% { transform: rotate(-6deg) scale(1); }
      50%     { transform: rotate(6deg)  scale(1.08); }
    }
    .fl-tr { animation: flowerSwayR 4s ease-in-out -1s infinite; }
    .fl-br { animation: flowerSwayR 4s ease-in-out -3s infinite; }
    @keyframes flowerSwayR {
      0%,100% { transform: scaleX(-1) rotate(-6deg); }
      50%     { transform: scaleX(-1) rotate(6deg); }
    }

    /* Wrap centrale */
    .wrap {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }

    /* Cuoricini sopra */
    .hearts-top {
      display: flex; gap: 8px;
      animation: heartsIn 2.6s ease 0.2s infinite;
    }
    .ht { font-size: clamp(16px,4vw,24px); }
    .ht:nth-child(2) { font-size: clamp(22px,6vw,32px); }

    @keyframes heartsIn {
      0%,8%  { opacity:0; transform: translateY(-8px) scale(0.7); }
      20%    { opacity:1; transform: translateY(0) scale(1); }
      70%    { opacity:1; }
      86%    { opacity:0; }
      100%   { opacity:0; }
    }

    /* Scritta */
    .grazie {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: clamp(74px, 21vw, 138px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.01em;
      color: transparent;
      background: linear-gradient(90deg, var(--rose) 50%, transparent 50%);
      background-size: 200% 100%;
      background-position: 100% 0;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-stroke: 1.8px var(--rose);
      animation: fill 2.6s cubic-bezier(.4,0,.2,1) 0.2s infinite;
      filter: drop-shadow(0 4px 18px rgba(212,96,122,0.22));
    }

    @keyframes fill {
      0%   { background-position: 100% 0; opacity: 0.15; }
      8%   { opacity: 1; }
      52%  { background-position: 0% 0; }
      70%  { background-position: 0% 0; opacity: 1; }
      86%  { opacity: 0; }
      100% { background-position: 100% 0; opacity: 0; }
    }

    /* Fiore centrale */
    .center-flower {
      font-size: clamp(28px, 8vw, 42px);
      animation: bloom 2.6s cubic-bezier(.4,0,.2,1) 0.2s infinite;
    }

    @keyframes bloom {
      0%,100% { transform: scale(0.3) rotate(-30deg); opacity:0; }
      12%     { transform: scale(1.15) rotate(5deg);  opacity:1; }
      22%     { transform: scale(1) rotate(0deg); }
      65%     { transform: scale(1); opacity:1; }
      82%     { transform: scale(0.5); opacity:0; }
    }
  </style>
</head>
<body>

  <!-- Petali cadenti -->
  <span class="petal p1">🌸</span>
  <span class="petal p2">🌷</span>
  <span class="petal p3">🌸</span>
  <span class="petal p4">🌺</span>
  <span class="petal p5">🌸</span>
  <span class="petal p6">🌷</span>
  <span class="petal p7">🌸</span>

  <!-- Fiori angoli -->
  <span class="flower fl-tl">💐</span>
  <span class="flower fl-tr">💐</span>
  <span class="flower fl-bl">🌸</span>
  <span class="flower fl-br">🌸</span>

  <div class="wrap">
    <div class="hearts-top">
      <span class="ht">🤍</span>
      <span class="ht">🩷</span>
      <span class="ht">🤍</span>
    </div>
    <span class="grazie">Grazie</span>
    <span class="center-flower">🌷</span>
  </div>

</body>
</html>
