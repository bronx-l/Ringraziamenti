<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grazie</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #5c94fc;
      overflow: hidden;
      image-rendering: pixelated;
    }

    /* Nuvole pixel */
    .clouds {
      position: fixed; top: 0; left: 0; right: 0;
      height: 40%; pointer-events: none; z-index: 0;
      display: flex; align-items: flex-start;
      padding-top: 18px;
      justify-content: space-around;
    }
    .cloud {
      font-size: clamp(28px, 7vw, 44px);
      animation: cloudDrift 12s linear infinite;
      opacity: 0.9;
    }
    .cloud:nth-child(2) { animation-delay: -4s; font-size: clamp(22px,5vw,34px); }
    .cloud:nth-child(3) { animation-delay: -8s; }

    @keyframes cloudDrift {
      0%   { transform: translateX(-60px); }
      100% { transform: translateX(60px); }
    }

    /* Terreno */
    .ground {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 60px;
      background: repeating-linear-gradient(
        90deg,
        #4a7c3f 0px, #4a7c3f 32px,
        #5a9e4e 32px, #5a9e4e 64px
      );
      border-top: 4px solid #2d5a1e;
      z-index: 0;
    }

    /* Monete */
    .coins {
      position: fixed; bottom: 64px; left: 0; right: 0;
      display: flex; justify-content: space-around;
      padding: 0 20px; z-index: 1; pointer-events: none;
    }
    .coin {
      font-size: clamp(16px, 4vw, 24px);
      animation: coinBounce 1s ease-in-out infinite;
    }
    .coin:nth-child(2) { animation-delay: -0.2s; }
    .coin:nth-child(3) { animation-delay: -0.4s; }
    .coin:nth-child(4) { animation-delay: -0.6s; }
    .coin:nth-child(5) { animation-delay: -0.8s; }

    @keyframes coinBounce {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-8px); }
    }

    /* Mario che salta */
    .mario {
      position: fixed;
      bottom: 60px; left: 50%;
      transform: translateX(-50%);
      font-size: clamp(36px, 10vw, 56px);
      z-index: 2;
      animation: marioJump 2.8s cubic-bezier(.4,0,.2,1) 0.2s infinite;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    @keyframes marioJump {
      0%    { transform: translateX(-50%) translateY(0);    opacity: 0; }
      8%    { opacity: 1; }
      25%   { transform: translateX(-50%) translateY(-70px); }
      50%   { transform: translateX(-50%) translateY(0); }
      70%   { transform: translateX(-50%) translateY(0); opacity: 1; }
      86%   { opacity: 0; }
      100%  { transform: translateX(-50%) translateY(0);    opacity: 0; }
    }

    /* Blocco ? */
    .question {
      position: fixed;
      bottom: 140px; left: 50%;
      transform: translateX(-50%);
      font-size: clamp(28px, 8vw, 44px);
      z-index: 2;
      animation: blockHit 2.8s cubic-bezier(.4,0,.2,1) 0.2s infinite;
    }

    @keyframes blockHit {
      0%,20%  { transform: translateX(-50%) translateY(0); }
      28%     { transform: translateX(-50%) translateY(-12px); }
      36%     { transform: translateX(-50%) translateY(0); }
      100%    { transform: translateX(-50%) translateY(0); }
    }

    /* Scritta GRAZIE */
    .wrap {
      position: relative; z-index: 3;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      margin-bottom: 80px;
    }

    .grazie {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(28px, 9vw, 62px);
      color: transparent;
      background: linear-gradient(90deg, #ffffff 50%, transparent 50%);
      background-size: 200% 100%;
      background-position: 100% 0;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-stroke: 2px #ffffff;
      text-shadow: none;
      animation: fill 2.8s cubic-bezier(.4,0,.2,1) 0.2s infinite;
      filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.5));
      letter-spacing: 0.05em;
    }

    @keyframes fill {
      0%   { background-position: 100% 0; opacity: 0.15; }
      8%   { opacity: 1; }
      52%  { background-position: 0% 0; }
      70%  { background-position: 0% 0; opacity: 1; }
      86%  { opacity: 0; }
      100% { background-position: 100% 0; opacity: 0; }
    }

    /* Stelle */
    .stars {
      display: flex; gap: 10px;
      animation: fill 2.8s ease 0.2s infinite;
    }
    .star {
      font-size: clamp(18px, 5vw, 28px);
      animation: spin 1.2s linear infinite;
    }
    .star:nth-child(2) { animation-delay: -0.4s; }
    .star:nth-child(3) { animation-delay: -0.8s; }

    @keyframes spin {
      0%   { transform: rotate(0deg)   scale(1); }
      50%  { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }
  </style>
</head>
<body>

  <div class="clouds">
    <span class="cloud">☁️</span>
    <span class="cloud">☁️</span>
    <span class="cloud">☁️</span>
  </div>

  <div class="coins">
    <span class="coin">🪙</span>
    <span class="coin">🪙</span>
    <span class="coin">🪙</span>
    <span class="coin">🪙</span>
    <span class="coin">🪙</span>
  </div>

  <div class="question">❓</div>
  <div class="mario">🍄</div>
  <div class="ground"></div>

  <div class="wrap">
    <div class="stars">
      <span class="star">⭐</span>
      <span class="star">⭐</span>
      <span class="star">⭐</span>
    </div>
    <span class="grazie">GRAZIE</span>
  </div>

</body>
</html>
