<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compá Grazie</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body {
      width:100%; height:100%;
      background: #0a2e0a;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
      font-family:'Bebas Neue', sans-serif;
    }

    /* sfondo sfumato verde scuro */
    body::before {
      content:'';
      position:fixed; inset:0; z-index:0;
      background: radial-gradient(ellipse at center, #1a5c1a 0%, #0a2e0a 70%);
    }

    /* cuori fluttuanti */
    .heart-float {
      position:fixed; z-index:1; pointer-events:none;
      font-size: clamp(14px,3vw,22px);
      opacity:0;
      animation: heartRise linear infinite;
    }
    @keyframes heartRise {
      0%  { transform:translateY(110vh) scale(.7) rotate(-10deg); opacity:0; }
      8%  { opacity:1; }
      88% { opacity:.6; }
      100%{ transform:translateY(-10vh) scale(1.1) rotate(10deg); opacity:0; }
    }

    /* card */
    .card {
      position:relative; z-index:2;
      display:flex; flex-direction:column;
      align-items:center; gap:10px;
      text-align:center; padding:20px;
    }

    /* foto circolare */
    .photo-wrap {
      width: clamp(130px,30vw,200px);
      height: clamp(130px,30vw,200px);
      border-radius:50%;
      border: 4px solid #fff;
      box-shadow: 0 0 0 4px #22b522, 0 0 30px rgba(34,181,34,0.5);
      overflow:hidden;
      opacity:0;
      animation: popIn .7s cubic-bezier(.2,.9,.2,1.2) .2s forwards;
      flex-shrink:0;
    }
    .photo-wrap img {
      width:100%; height:100%; object-fit:cover; object-position: center top;
    }

    /* COMPA' */
    .compa {
      font-family:'Bebas Neue', Impact, sans-serif;
      font-size: clamp(70px,19vw,160px);
      letter-spacing:0.05em; line-height:1;
      color:#fff;
      text-shadow: 0 0 30px rgba(34,181,34,0.7), 2px 2px 0 #22b522;
      opacity:0; transform:scale(.6) rotate(-3deg);
      animation: popIn .7s cubic-bezier(.2,.9,.2,1.2) .6s forwards;
    }

    /* GRAZIE */
    .grazie {
      font-family:'Pacifico', cursive;
      font-size: clamp(50px,14vw,110px);
      color: transparent;
      background: linear-gradient(90deg, #ffffff 30%, #22b522 60%, #ffffff 90%);
      background-size:200% 100%;
      -webkit-background-clip:text; background-clip:text;
      line-height:1;
      opacity:0;
      animation: popIn .7s cubic-bezier(.2,.9,.2,1.2) 1s both,
                 shimmer 3s linear 1.8s infinite;
    }
    @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }

    /* cuore grande biancoverde */
    .big-heart {
      font-size: clamp(40px,11vw,70px);
      opacity:0;
      animation: popIn .5s ease 1.4s both, pulse 1.4s ease 2s infinite;
    }
    @keyframes pulse {
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.18); }
    }

    @keyframes popIn {
      from{ opacity:0; transform:scale(.6) rotate(-3deg); }
      to  { opacity:1; transform:scale(1) rotate(0); }
    }

    /* pulsante musica */
    .music-btn {
      position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
      z-index:10;
      background:#fff; color:#0a2e0a;
      border:none; border-radius:50px;
      padding:13px 28px;
      font-size: clamp(13px,3vw,16px);
      font-family:'Bebas Neue', sans-serif;
      letter-spacing:.1em;
      cursor:pointer;
      display:flex; align-items:center; gap:10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.35);
      animation: popIn 1s ease 2s both;
      transition: background .2s, transform .1s;
    }
    .music-btn:hover { background:#22b522; color:#fff; transform:translateX(-50%) scale(1.04); }
    .music-btn .note { font-size:1.4em; animation: bounce .7s ease infinite alternate; }
    @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-4px)} }

    #yt-player { position:fixed; bottom:-200px; left:-200px; width:1px; height:1px; opacity:0; pointer-events:none; }
  </style>
</head>

    // cuori fluttuanti biancoverdi
    const hSymbols = ['🤍','💚','🤍','💚','🫶'];
    const hBg = document.getElementById('hearts-bg');
    for(let i=0;i<22;i++){
      const h = document.createElement('div');
      h.className='heart-float';
      h.textContent = hSymbols[Math.floor(Math.random()*hSymbols.length)];
      h.style.left = Math.random()*100+'vw';
      h.style.animationDuration = (5+Math.random()*7)+'s';
      h.style.animationDelay = (-Math.random()*10)+'s';
      hBg.appendChild(h);
    }

    // YT Player
    let player, playerReady=false, pendingPlay=false;
    function onYouTubeIframeAPIReady(){
      player = new YT.Player('yt-player',{
        height:'1', width:'1',
        videoId:'do7qx_W3HzA',
        playerVars:{ autoplay:0, loop:1, playlist:'do7qx_W3HzA', controls:0, modestbranding:1, iv_load_policy:3 },
        events:{
          onReady: function(e){
            playerReady=true;
            if(pendingPlay){ e.target.unMute(); e.target.setVolume(85); e.target.playVideo(); }
          }
        }
      });
    }

    let playing=false;
    function toggleMusic(){
      if(!playing){
        playing=true;
        document.getElementById('musicLabel').textContent='PAUSA MUSICA';
        document.getElementById('musicNote').textContent='🔊';
        if(playerReady){ player.unMute(); player.setVolume(85); player.playVideo(); }
        else pendingPlay=true;
      } else {
        playing=false;
        document.getElementById('musicLabel').textContent='ATTIVA MUSICA';
        document.getElementById('musicNote').textContent='🎵';
        if(playerReady) player.pauseVideo();
      }
    }
  </script>
</body>
</html>
